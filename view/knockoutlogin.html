<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Knockout Zone</title>
    <link rel="stylesheet" href="knockoutlogin.css">
</head>

<body>
    <div class="container">
        <a href="knockouthome.html" id="logo">
            <img id="logo" src="images/logo.png" alt="Home">
        </a>
        <form action="knockoutloginsignin.php" method="POST">
            <input type="hidden" name="login" value="1">
            <label for="email">Email</label>
            <input type="text" name="email" id="email" placeholder="example@email.com">

            <label for="password">Contraseña</label>
            <input type="text" name="password" id="password" placeholder="123ABC..">
            <div class="link">
                <a href="#">¿Has olvidado la contraseña?</a> 
            </div>
            <div class="link">
                ¿No tienes cuenta? <a href="knockoutsignin.html">¡Registrate!</a> 
            </div>
            <input type="submit" value="Iniciar sesión">
        </form>
    </div>
</body>

</html>
